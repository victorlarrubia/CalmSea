apiVersion: v1
kind: Namespace
metadata:
  name: fiware
---
# =========================
# MongoDB Interno (para Orion)
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-db-internal
  namespace: fiware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-db-internal
  template:
    metadata:
      labels:
        app: mongo-db-internal
    spec:
      containers:
        - name: mongo
          image: mongo:4.4
          args: ["mongod", "--nojournal", "--bind_ip_all"]
          ports:
            - containerPort: 27017
          volumeMounts:
            - mountPath: /data/db
              name: mongo-internal-storage
      volumes:
        - name: mongo-internal-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-db-internal
  namespace: fiware
spec:
  selector:
    app: mongo-db-internal
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
# =========================
# Orion Context Broker
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion
  namespace: fiware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orion
  template:
    metadata:
      labels:
        app: orion
    spec:
      containers:
        - name: orion
          image: fiware/orion:3.10.1
          args: ["-dbhost", "mongo-db-internal", "-port", "1026"]
          ports:
            - containerPort: 1026
          env:
            - name: ORION_LOG_LEVEL
              value: INFO
---
apiVersion: v1
kind: Service
metadata:
  name: orion
  namespace: fiware
spec:
  type: LoadBalancer
  selector:
    app: orion
  ports:
    - port: 1026
      targetPort: 1026
---
# =========================
# MongoDB Histórico (para STH-Comet)
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-db-historical
  namespace: fiware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-db-historical
  template:
    metadata:
      labels:
        app: mongo-db-historical
    spec:
      containers:
        - name: mongo
          image: mongo:4.4
          args: ["mongod", "--nojournal", "--bind_ip_all"]
          ports:
            - containerPort: 27017
          volumeMounts:
            - mountPath: /data/db
              name: mongo-historical-storage
      volumes:
        - name: mongo-historical-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-db-historical
  namespace: fiware
spec:
  selector:
    app: mongo-db-historical
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
# =========================
# STH-Comet
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sth-comet
  namespace: fiware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sth-comet
  template:
    metadata:
      labels:
        app: sth-comet
    spec:
      containers:
        - name: sth-comet
          image: fiware/sth-comet:2.11.0
          ports:
            - containerPort: 8666
          env:
            - name: DB_URI
              value: "mongo-db-historical:27017"
            - name: DB_NAME
              value: "sth"
            - name: LOGOPS_LEVEL
              value: "DEBUG"
            - name: STH_HOST
              value: "0.0.0.0"
            - name: STH_PORT
              value: "8666"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sth-comet
  namespace: fiware
spec:
  type: LoadBalancer
  selector:
    app: sth-comet
  ports:
    - port: 8666
      targetPort: 8666
---
# =========================
# Mosquitto (MQTT Broker)
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: fiware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - containerPort: 1883
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: fiware
spec:
  selector:
    app: mosquitto
  ports:
    - port: 1883
      targetPort: 1883
  type: ClusterIP
---
# =========================
# IoT Agent (JSON)
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-agent
  namespace: fiware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-agent
  template:
    metadata:
      labels:
        app: iot-agent
    spec:
      containers:
        - name: iot-agent
          image: fiware/iotagent-json
          env:
            - name: IOTA_CB_HOST
              value: orion
            - name: IOTA_CB_PORT
              value: "1026"
            - name: IOTA_NORTH_PORT
              value: "4041"
            - name: IOTA_REGISTRY_TYPE
              value: mongodb
            - name: IOTA_MONGO_HOST
              value: mongo-db-internal
            - name: IOTA_MONGO_PORT
              value: "27017"
            - name: IOTA_MONGO_DB
              value: iotagent
          ports:
            - containerPort: 4041
---
apiVersion: v1
kind: Service
metadata:
  name: iot-agent
  namespace: fiware
spec:
  type: LoadBalancer
  selector:
    app: iot-agent
  ports:
    - port: 4041
      targetPort: 4041
