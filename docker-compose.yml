services:

  # --- TESTES UNITÁRIOS ---
  tests-unit:
    build: .
    container_name: agentk-tests-unit
    environment:
      - PYTHONPATH=/app
      - OLLAMA_HOST=127.0.0.1:11434
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: ["python3", "-m", "pytest", "tests/unit"]

  # --- TESTES DE INTEGRAÇÃO ---
  tests-integration:
    build: .
    container_name: agentk-tests-integration
    network_mode: "host"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app
      - KUBECONFIG=/root/.kube/config
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./remote-kubeconfig.yaml:/root/.kube/config
      - ./certs-remotos:/app/certs
    command: ["python3", "tests/integration/test_full_agent_flow.py"]

  # --- O SERVIDOR DE FERRAMENTAS (MCP) ---
  servermcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: servermcp
    network_mode: "host"
    environment:
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - KUBECONFIG=/root/.kube/config
    volumes:
      - ./src:/app/src
      - ./remote-kubeconfig.yaml:/root/.kube/config
      - ./certs-remotos:/app/certs
    restart: "no"

  # --- O AGENTE (INTERFACE E LÓGICA) ---
  agentk:
    build: .
    container_name: agentk-mcp
    network_mode: "host"
    depends_on:
      - servermcp
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app
      - KUBECONFIG=/root/.kube/config
      - LLM_HARDWARE_TARGET=gpu
      - OLLAMA_HOST=127.0.0.1:11434
    volumes:
      - ./src:/app/src
      - ./remote-kubeconfig.yaml:/root/.kube/config
      - ./certs-remotos:/app/certs
      - ./logs:/app/logs
      - ./tests:/app/tests
      - ./results:/app/results
      - ./docs:/app/docs

  # --- OPÇÕES DE HARDWARE OLLAMA ---
  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: ollama-nvidia
    profiles: ["nvidia"]
    network_mode: "host"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-amd:
    image: ollama/ollama:rocm
    container_name: ollama-amd
    profiles: ["amd"]
    network_mode: "host"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=8.0.3
      - HSA_ENABLE_SDMA=0
      - OLLAMA_HOST=0.0.0.0

  ollama-cpu:
    image: ollama/ollama:latest
    container_name: ollama-cpu
    network_mode: "host"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama

  # --- DOWNLOADER DE MODELO LOCAL ---
  ollama-puller:
    image: ollama/ollama:latest
    container_name: ollama-puller
    network_mode: "host"
    environment:
      - OLLAMA_HOST=127.0.0.1:11434
      - OLLAMA_MODEL=qwen2.5:3b
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "⏳ Aguardando servidor Ollama em 127.0.0.1:11434..."
        sleep 15
        echo "📥 Baixando modelo $${OLLAMA_MODEL}..."
        ollama pull $${OLLAMA_MODEL}
        echo "✅ Modelo $${OLLAMA_MODEL} pronto para o benchmark."

  # --- TESTE DE PERFORMANCE ---
  performancetest:
    build: .
    container_name: performance-test
    network_mode: "host"
    depends_on:
      ollama-puller:
        condition: service_completed_successfully
    environment:
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - KUBECONFIG=/app/remote-kubeconfig.yaml
      - OLLAMA_HOST=127.0.0.1:11434
      - PERFORMANCE_TEST_MODELS=qwen2.5:3b
      - PERFORMANCE_TEST_REPS=1
      - PERFORMANCE_TEST_SLEEP_SECONDS=5
    volumes:
      - ./src:/app/src
      - ./docs/tests:/app/docs/tests
      - ./results:/app/results
      - ./remote-kubeconfig.yaml:/app/remote-kubeconfig.yaml
      - ./certs-remotos:/app/certs
    command: ["python3", "src/performance_test/main.py"]
    restart: on-failure

volumes:
  ollama_data: