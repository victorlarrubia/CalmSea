services:

# --- TESTES UNITÁRIOS ---
  # Focados em lógica pura, sem depender de rede ou K8s real (usa mocks)
  tests-unit:
    build: .
    container_name: agentk-tests-unit
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: ["python3", "-m", "pytest", "tests/unit"]

  # --- TESTES DE INTEGRAÇÃO ---
  # Testa o fluxo real: Agente -> MCP -> Kubernetes
  tests-integration:
    build: .
    container_name: agentk-tests-integration
    network_mode: "host" # Essencial para falar com o Minikube local/remoto
    depends_on:
      - servermcp
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app
      - KUBECONFIG=/root/.kube/config
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./remote-kubeconfig.yaml:/root/.kube/config
      - ./certs-remotos:/app/certs
    # Roda especificamente o seu fluxo completo
    command: ["python3", "tests/integration/test_full_agent_flow.py"]

  # --- O SERVIDOR DE FERRAMENTAS (MCP) ---
  servermcp:
    build: 
      context: .
      dockerfile: Dockerfile.mcp # Certifique-se de ter esse Dockerfile
    container_name: servermcp
    network_mode: "host" # Mantém a simplicidade para o túnel SSH
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./src:/app/src
      - ./remote-kubeconfig.yaml:/root/.kube/config
      - ./certs-remotos:/app/certs
    restart: always

  # --- O AGENTE (INTERFACE E LÓGICA) ---
  agentk:
    build: .
    container_name: agentk-mcp
    network_mode: "host"
    
    depends_on:
      - servermcp # Garante que o servidor suba antes do agente

    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app
      - KUBECONFIG=/root/.kube/config
      # Variável para o requisito v1.3: Seleção de Hardware
      - LLM_HARDWARE_TARGET=gpu 
    
    volumes:
      - ./src:/app/src
      - ./remote-kubeconfig.yaml:/root/.kube/config
      - ./certs-remotos:/app/certs
      # Adicionamos a pasta de logs para o requisito de métricas
      - ./logs:/app/logs 
      - ./tests:/app/tests 

  performancetest:
    build: .
    container_name: performance-test
    network_mode: "host"
    depends_on:
      - servermcp
    environment:
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./src:/app/src
      - ./docs/tests:/app/docs/tests
      - ./results:/app/results
      - ./remote-kubeconfig.yaml:/root/.kube/config
      - ./certs-remotos:/app/certs
    command: ["python3", "src/performance_test/main.py"]

    # --- REQUISITO v1.3: SELEÇÃO DE RECURSOS GPU ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    restart: on-failure